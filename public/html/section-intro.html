<link rel="stylesheet" href="/assets/css/styles-base.css">
<link rel="stylesheet" href="/assets/css/brilho-texturas.css">
<link rel="stylesheet" href="/assets/css/j-panel-glow.css">
<link rel="stylesheet" href="/assets/css/styles-intro.css">

<section 
  id="section-intro"
  class="section j-screen-vert"
  data-section="intro">

  <div class="j-panel-glow intro-panel">
    <div class="j-perg-v-inner">
      <div class="j-arcane-card intro-wrap">
        <div class="parchment-rough">
          <div class="parchment-inner-rough">
            <div class="intro-wrap">

              <!-- TÍTULO -->
              <h1
                class="intro-title"
                data-typing="true"
                data-speed="20"
                data-cursor="true"
                data-i18n-text="intro.title"
                data-text="Jornada do Conhecimento">
              </h1>

              <!-- FRASES -->
              <div
                id="intro-p1"
                class="parchment-text-rough lumen-typing"
                data-typing="true"
                data-speed="20"
                data-cursor="true"
                data-i18n-text="intro.p1"
                data-text="Bom dia.">
              </div>

              <div
                id="intro-p2"
                class="parchment-text-rough lumen-typing"
                data-typing="true"
                data-speed="20"
                data-cursor="true"
                data-i18n-text="intro.p2"
                data-text="Respeito é amor.">
              </div>

              <div
                id="intro-p3"
                class="parchment-text-rough lumen-typing"
                data-typing="true"
                data-speed="20"
                data-cursor="true"
                data-i18n-text="intro.p3"
                data-text="Vamos em paz.">
              </div>

              <div
                id="intro-p4"
                class="parchment-text-rough lumen-typing"
                data-typing="true"
                data-speed="20"
                data-cursor="true"
                data-i18n-text="intro.p4"
                data-text="Amor é vida.">
              </div>

              <div
                id="intro-p5"
                class="parchment-text-rough lumen-typing"
                data-typing="true"
                data-speed="20"
                data-cursor="true"
                data-i18n-text="intro.p5"
                data-text="Deus seja louvado.">
              </div>

              <!-- BOTÃO -->
              <div class="parchment-actions-rough">
                <button
                  id="btn-avancar"
                  type="button"
                  class="btn btn-primary btn-stone"
                  data-action="avancar"
                  data-i18n="intro.start">
                  Iniciar
                </button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</section>
