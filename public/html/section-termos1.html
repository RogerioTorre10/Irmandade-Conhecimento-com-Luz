<section id="section-termos1" class="section j-screen-vert" data-section="termos1">
  <div class="j-panel-glow termos-panel">
    <div class="j-perg-v-inner">
      <div class="j-arcane-card termos-wrap">

          <div class="parchment-inner-rough">
            <div class="termos-wrap">

              <div id="termos1">

                <h2 class="section-title"
                    data-typing="true"
                    data-cursor="true"
                    data-speed="40"
                    data-i18n-text="terms1.title"
                    data-text="">
                </h2>

                <p data-typing="true"
                   data-cursor="true"
                   data-speed="40"
                   data-i18n-text="terms1.subtitle"
                   data-text="">
                </p>

                <p data-typing="true"
                   data-cursor="true"
                   data-speed="40"
                   data-i18n-text="terms1.description"
                   data-text="">
                </p>

                <ul>
                  <li data-typing="true" data-i18n-text="terms1.li1" data-text=""></li>
                  <li data-typing="true" data-i18n-text="terms1.li2" data-text=""></li>
                  <li data-typing="true" data-i18n-text="terms1.li3" data-text=""></li>
                  <li data-typing="true" data-i18n-text="terms1.li4" data-text=""></li>

              </div>

              <div class="footer-actions">
                <button class="nextBtn btn btn-stone"
                        data-action="avancar"
                        data-i18n="common.next"
                        type="button"
                        disabled>
                  Próxima página
                </button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  const press = (el) => {
    el.classList.add('is-pressed');
    setTimeout(() => el.classList.remove('is-pressed'), 260);
  };
  document.addEventListener('click', (e) => {
    const b = e.target.closest('.btn, .btn-stone, .btn-stone-espinhos');
    if (b) press(b);
  });
  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target.matches('.btn, .btn-stone, .btn-stone-espinhos')) {
      press(e.target);
    }
  });
})();
</script>
