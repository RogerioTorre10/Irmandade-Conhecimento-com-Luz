<link rel="stylesheet" href="/assets/css/styles-base.css">
<link rel="stylesheet" href="/assets/css/brilho-texturas.css">
<link rel="stylesheet" href="/assets/css/j-panel-glow.css">
<link rel="stylesheet" href="/assets/css/styles-intro.css">

<section id="section-dados-pessoais" class="section section-dados-pessoais">
  <div class="j-panel-glow">
    <div class="j-perg-v-inner">
      <div class="j-arcane-card">
        <div class="pergaminho-content">
          <h1 class="typing-text">Dados Pessoais</h1>
          <p class="intro-text">
            Compartilhe alguns dados para enriquecer sua devolutiva.
          </p>

          <div class="form-grid">
            <input id="dp-nome" type="text" placeholder="Nome completo" />
            <select id="dp-idade-faixa">
              <option value="">Faixa etária</option>
              <option>Até 17</option>
              <option>18 a 24</option>
              <option>25 a 34</option>
              <option>35 a 44</option>
              <option>45 a 59</option>
              <option>60+</option>
            </select>            

            <input id="dp-profissao" type="text" placeholder="Profissão / área" />
            <select id="dp-estado-civil">
              <option value="">Estado civil</option>
              <option>Solteiro(a)</option>
              <option>Casado(a)</option>
              <option>Divorciado(a)</option>
              <option>Viúvo(a)</option>
              <option>Outro</option>
            </select>

            <select id="dp-filhos">
              <option value="">Filhos</option>
              <option>Não</option>
              <option>Sim</option>
            </select>            
            <input id="dp-cidade" type="text" placeholder="Cidade" />
            <input id="dp-estado" type="text" placeholder="Estado" />
            <input id="dp-religiao" type="text" placeholder="Religião / espiritualidade" />
         
            <textarea id="dp-observacoes" rows="4" placeholder="Algo importante que deseja compartilhar?"></textarea>
          <div class="final-acoes">
           <button id="btn-dp-continuar" type="button">Continuar ➜</button>
          </div>    
          <div id="dados-pessoais-status" class="status-box" style="display:none;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
