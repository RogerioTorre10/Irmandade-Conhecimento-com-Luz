<link rel="stylesheet" href="/assets/css/styles-base.css">
<link rel="stylesheet" href="/assets/css/brilho-texturas.css">
<link rel="stylesheet" href="/assets/css/j-panel-glow.css">
<link rel="stylesheet" href="/assets/css/styles-dados-pessoais.css">

<section id="section-dados-pessoais" class="section section-dados-pessoais">
  <div class="j-panel-glow dados-painel">
    <div class="j-perg-v-inner">
      <div class="j-arcane-card">
        <div class="pergaminho-content">

          <h1
            id="dp-title"
            class="typing-text"
            data-typing="true"
            data-cursor="true"
            data-speed="40"
            data-i18n-text="dados.title"
            data-text="Dados Pessoais"
          >Dados Pessoais</h1>

          <p
            id="dp-subtitle"
            class="intro-text"
            data-typing="true"
            data-cursor="true"
            data-speed="38"
            data-i18n-text="dados.subtitle"
            data-text="Preencha os dados para enriquecer sua devolutiva."
          >Preencha os dados para enriquecer sua devolutiva.</p>

          <div class="form-grid">

            <input id="dp-nome"
                   type="text"
                   data-i18n-placeholder="dados.nome"
                   placeholder="Nome completo" />

            <input id="dp-cidade"
                   type="text"
                   data-i18n-placeholder="dados.cidade"
                   placeholder="Cidade" />

            <input id="dp-estado"
                   type="text"
                   data-i18n-placeholder="dados.estado"
                   placeholder="Estado" />

            <input id="dp-profissao"
                   type="text"
                   data-i18n-placeholder="dados.profissao"
                   placeholder="Profissão / área" />

            <input id="dp-religiao"
                   type="text"
                   data-i18n-placeholder="dados.religiao"
                   placeholder="Religião / espiritualidade" />
            </div>
            <div class="dados-linha-tripla">

              <select id="dp-idade-faixa">
                <option value="" data-i18n="dados.idade">Faixa etária</option>
                <option value="Até 17" data-i18n="dados.idade1">Até 17</option>
                <option value="18 a 24" data-i18n="dados.idade2">18 a 24</option>
                <option value="25 a 34" data-i18n="dados.idade3">25 a 34</option>
                <option value="35 a 44" data-i18n="dados.idade4">35 a 44</option>
                <option value="45 a 59" data-i18n="dados.idade5">45 a 59</option>
                <option value="60+" data-i18n="dados.idade6">60+</option>
              </select>

              <select id="dp-estado-civil">
                <option value="" data-i18n="dados.estado_civil">Estado civil</option>
                <option value="Solteiro(a)" data-i18n="dados.ec1">Solteiro(a)</option>
                <option value="Casado(a)" data-i18n="dados.ec2">Casado(a)</option>
                <option value="Divorciado(a)" data-i18n="dados.ec3">Divorciado(a)</option>
                <option value="Viúvo(a)" data-i18n="dados.ec4">Viúvo(a)</option>
                <option value="Outro" data-i18n="dados.ec5">Outro</option>
              </select>

              <select id="dp-filhos">
                <option value="" data-i18n="dados.filhos">Filhos</option>
                <option value="Não" data-i18n="dados.filhos_nao">Não</option>
                <option value="Sim" data-i18n="dados.filhos_sim">Sim</option>
              </select>

            </div>      
                    

             <!-- 🔥 NOVO BLOCO PERSONALIDADE -->
           <h2 class="subtitulo-bloco">Perfil de Personalidade</h2>

         <div class="form-grid form-grid-personalidade">

  <label>Temperamento
    <select id="dp-temperamento">
      <option value="">Selecione</option>
      <option>Explosivo</option>
      <option>Impulsivo</option>
      <option>Ansioso</option>
      <option>Nervoso</option>
      <option>Calmo</option>
      <option>Passivo</option>
      <option>Instável</option>
      <option>Sensível</option>
      <option>Intenso</option>
      <option>Equilibrado</option>
      <option>Irritável</option>
      <option>Pacífico</option>
    </select>
  </label>

  <label>Comportamento
    <select id="dp-comportamento">
      <option value="">Selecione</option>
      <option>Agressivo</option>
      <option>Rígido</option>
      <option>Flexível</option>
      <option>Confuso</option>
      <option>Ambíguo</option>
      <option>Inseguro</option>
      <option>Seguro</option>
      <option>Sociável</option>
      <option>Isolado</option>
      <option>Proativo</option>
      <option>Reativo</option>
      <option>Responsável</option>
      <option>Desorganizado</option>
    </select>
  </label>

  <label>Caráter
    <select id="dp-carater">
      <option value="">Selecione</option>
      <option>Firme</option>
      <option>Forte</option>
      <option>Justo</option>
      <option>Honesto</option>
      <option>Íntegro</option>
      <option>Duro</option>
      <option>Frágil</option>
      <option>Volátil</option>
      <option>Determinado</option>
      <option>Perseverante</option>
      <option>Instável</option>
      <option>Corrompível</option>
      <option>Ético</option>
      <option>Incoerente</option>
    </select>
  </label>

  <label>Índole
    <select id="dp-indole">
      <option value="">Selecione</option>
      <option>Boa</option>
      <option>Generosa</option>
      <option>Empática</option>
      <option>Solidária</option>
      <option>Neutra</option>
      <option>Egoísta</option>
      <option>Fria</option>
      <option>Calculista</option>
      <option>Manipuladora</option>
      <option>Falsa</option>
      <option>Cruel</option>
      <option>Perversa</option>
      <option>Medíocre</option>
      <option>Instável</option>
      <option>Corrompida</option>
    </select>
  </label>

</div>

            

            <textarea id="dp-observacoes"
                      rows="4"
                      data-i18n-placeholder="dados.obs"
                      placeholder="Algo importante que deseja compartilhar?"></textarea>

            <div class="final-acoes">
              <button id="btn-dp-continuar"
                      type="button"
                      class="btn btn-stone"
                      data-i18n="common.continue">
                Continuar
              </button>
            </div>

            <div id="dados-pessoais-status"
                 class="status-box"
                 style="display:none;"></div>

          </div>

        </div>
      </div>
    </div>
  </div>
</section>
