<link rel="stylesheet" href="/assets/css/style-base.css">
<link rel="stylesheet" href="/assets/css/brilho-texturas.css">
<link rel="stylesheet" href="/assets/css/j-panel-glow.css">
<link rel="stylesheet" href="/assets/css/styles-final.css">
<link rel="stylesheet" href="/assets/css/styles-layout.css">

<section id="section-final" class="section section-final">
  <div class="final-pergaminho-wrapper">
    <div class="j-panel-glow final-panel">
      <div class="j-perg-v-inner">
        <div class="j-arcane-card final-wrap">
          <div class="parchment-rough">
            <div class="parchment-inner-rough">
              <div class="pergaminho-content">

                <!-- TÍTULO -->
                <h1 id="final-title"
                    class="final-title typing-text"
                    data-typing="true"
                    data-i18n-text="final.title"
                    data-text="Fim da Jornada">
                </h1>

                <!-- MENSAGEM FINAL -->
                <div id="final-message" class="final-message">

                  <p data-typing="true"
                     data-i18n-text="final.p1"
                     data-text="Suas respostas foram recebidas com honra pela Irmandade.">
                  </p>

                  <p data-typing="true"
                     data-i18n-text="final.p2"
                     data-text="Você plantou sementes de confiança, coragem e luz.">
                  </p>

                  <p data-typing="true"
                     data-i18n-text="final.p3"
                     data-text="Continue caminhando. A jornada nunca termina.">
                  </p>

                  <p data-typing="true"
                     data-i18n-text="final.p4"
                     data-text="Volte quando precisar reacender a chama.">
                  </p>

                  <p class="final-bold"
                     data-typing="true"
                     data-i18n-text="final.p5"
                     data-text="Você é a luz. Você é a mudança.">
                  </p>

                </div>

                <!-- AÇÕES -->
                <div class="final-acoes">

                  <button id="btnPdf"
                          class="btn btn-gold btn-acao-final"
                          data-i18n="final.pdf">
                    PDF
                  </button>

                  <button id="btnBaixarSelfie"
                          class="btn btn-light btn-acao-final"
                          data-i18n="final.selfie">
                    SELFIECARD
                  </button>

                  <button id="btnVoltarPortal"
                          class="btn btn-light btn-acao-final"
                          data-i18n="final.back">
                    VOLTAR
                  </button>

                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
