<link rel="stylesheet" href="/assets/css/style-base.css">
<link rel="stylesheet" href="/assets/css/brilho-texturas.css">
<link rel="stylesheet" href="/assets/css/j-panel-glow.css">
<link rel="stylesheet" href="/assets/css/styles-layout.css">

<section id="section-perguntas-crescimento" class="section section-perguntas" data-bloco="3">
  <div class="perguntas-pergaminho-wrapper">
    <div class="j-panel-glow perguntas-panel">
      <div class="j-perg-v-inner">
        <div class="j-arcane-card perguntas-wrap">
          <div class="parchment-rough">
            <div class="parchment-inner-rough">
              <div class="pergaminho-content">

                  <!-- AMPULHETA / TOTAL GERAL -->
<div class="jp-total-top">
  <div class="jp-total-icon">⏳</div>
  <div id="progress-total-value" class="jp-total-value">1 / 50</div>
</div>

                <!-- TÍTULO DO BLOCO -->
 <h1 class="perguntas-title"> Bloco 3 — Crescimento</h1>

              
<!-- PERGUNTA -->
<div class="jp-question-display">
  <div id="question-display" class="jp-question-typed typing-text"></div>
</div>

<!-- RESPOSTA -->
<div class="jp-answer-container">
  <div class="jp-answer-frame">
    <div class="jp-answer-bg"></div>
    <textarea
      id="jp-answer-input"
      class="jp-answer-input"
      placeholder="Digite com verdade e calma..."
      maxlength="1200"
    ></textarea>
  </div>
</div>

<!-- DEVOLUTIVA DO GUIA -->
<div id="jp-ai-response-wrap" class="jp-ai-response-wrap">
  <div class="jp-ai-response-label">Devolutiva do Guia</div>
  <div id="jp-ai-response" class="jp-ai-response" hidden></div>
</div>

<!-- PROGRESSO DO BLOCO -->
<div class="jp-progress-inline">
  <div class="jp-progress-bar">
    <div id="progress-question-fill" class="jp-progress-fill"></div>
  </div>
  <div id="progress-question-value" class="jp-progress-value">1 / 10</div>
</div>

<!-- BOTÕES -->
<div class="perguntas-controls">
  <button id="jp-btn-falar" class="btn-perguntas btn-falar" type="button">🔊</button>
  <button id="jp-btn-mic" class="btn-perguntas btn-mic" type="button">🎤</button>
  <button id="jp-btn-apagar" class="btn-perguntas btn-apagar" type="button">✖</button>
  <button id="jp-btn-confirmar" class="btn-perguntas btn-confirm" type="button">Continuar</button>
</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
 </section>
