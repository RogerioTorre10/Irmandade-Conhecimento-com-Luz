<link rel="stylesheet" href="/assets/css/styles-base.css">
<link rel="stylesheet" href="/assets/css/brilho-texturas.css">
<link rel="stylesheet" href="/assets/css/j-panel-glow.css">
<link rel="stylesheet" href="/assets/css/styles-selfie.css">

<section id="section-selfie" class="section j-screen-vert" data-section="selfie">
  <div class="j-panel-glow selfie-panel">
    <div class="j-perg-v-inner">
      <div class="j-arcane-card selfie-wrap">
        <div class="conteudo-pergaminho">

          <header class="selfie-header">
            <h2 id="selfie-title"
                data-typing="true"
                data-speed="40"
                data-cursor="true"
                data-i18n="selfie.title"
                data-i18n-text="selfie.title"
                data-text="Tirar sua foto">
            </h2>

            <button id="btn-skip-selfie"
                    class="btn btn-stone-espinhos"
                    type="button"
                    data-i18n="selfie.skip">
              Sem foto
            </button>
          </header>

          <div id="selfieOrientWrap">
            <p id="selfieTexto"
               data-typing="true"
               data-speed="40"
               data-cursor="true"
               data-i18n="selfie.instruction"
               data-i18n-text="selfie.instruction"
               data-text="${nome}, afaste um pouco o celular e posicione seu rosto. ${guiaNome} vai conduzir você.">
            </p>
          </div>

          <div class="btn-row">
            <button id="startCamBtn"
                    class="btn btn-stone-espinhos"
                    type="button"
                    data-i18n="selfie.preview">
              Prévia
            </button>

            <button id="btn-selfie-capture"
                    class="btn btn-stone-espinhos"
                    type="button"
                    disabled
                    data-i18n="selfie.capture">
              Capturar
            </button>

            <button id="btn-selfie-confirm"
                    class="btn btn-stone-espinhos"
                    type="button"
                    disabled
                    data-i18n="selfie.start">
              Iniciar
            </button>
          </div>

          <div class="selfie-preview-wrap">
            <div class="preview-frame">
              <img id="selfiePreview"
                   src="/assets/img/orbe-dourado-placeholder.jpg"
                   data-i18n-title="selfie.preview"
                   alt="Pré-visualização">

              <video id="selfieVideo"
                     autoplay
                     playsinline
                     muted
                     style="display:none;">
              </video>

              <canvas id="selfieCanvas" style="display:none;"></canvas>
            </div>
          </div>

          <div class="ranges-panel">
            <div class="range-row">
              <span class="range-label" data-i18n="selfie.zoom">Zoom Geral</span>
              <input id="zoomAll" type="range" min="0.4" max="1.2" step="0.01" value="0.6">
              <span class="range-val" id="zoomAllVal">0.60×</span>
            </div>

            <div class="range-row">
              <span class="range-label" data-i18n="selfie.horizontal">Horizontal</span>
              <input id="zoomX" type="range" min="0.8" max="1.4" step="0.01" value="1.0">
              <span class="range-val" id="zoomXVal">1.00×</span>
            </div>

            <div class="range-row">
              <span class="range-label" data-i18n="selfie.vertical">Vertical</span>
              <input id="zoomY" type="range" min="0.8" max="1.4" step="0.01" value="1.0">
              <span class="range-val" id="zoomYVal">1.00×</span>
            </div>
          </div>

          <div id="selfie-erro"
               class="hidden"
               data-i18n-text="selfie.error"
               data-text="Não foi possível acessar a câmera. Verifique as permissões.">
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
